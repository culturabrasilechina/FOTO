<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Baixar Foto</title>
<style>
body { text-align:center; font-family:Arial; }
canvas { border:1px solid #ccc; margin-top:20px; }
button { padding:10px 20px; margin-top:20px; }
</style>
</head>
<body>

<h2>Enviar Foto</h2>
<input type="file" id="upload" accept="image/*">
<br>
<canvas id="canvas" width="800" height="1000"></canvas>
<br>
<button onclick="download()">Baixar Foto</button>

<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');

const template = new Image();
template.src = "template.png";

template.onload = function () {
    ctx.drawImage(template, 0, 0, canvas.width, canvas.height);
};

document.getElementById('upload').onchange = function (e) {
    const reader = new FileReader();

    reader.onload = function (event) {
        const img = new Image();

        img.onload = async function () {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    let sx, sy, cropSize;

    // 🔍 人脸检测
    const detection = await faceapi.detectSingleFace(
        img,
        new faceapi.TinyFaceDetectorOptions()
    );

    if (detection) {
        const box = detection.box;

        // 以脸为中心，裁正方形
        const faceCenterX = box.x + box.width / 2;
        const faceCenterY = box.y + box.height / 2;

        cropSize = Math.max(box.width, box.height) * 2;

        sx = faceCenterX - cropSize / 2;
        sy = faceCenterY - cropSize / 2;

        // 防止裁剪超出图片边界
        sx = Math.max(0, Math.min(sx, img.width - cropSize));
        sy = Math.max(0, Math.min(sy, img.height - cropSize));
    } else {
        // ❗没检测到脸，退回居中裁剪
        cropSize = Math.min(img.width, img.height);
        sx = (img.width - cropSize) / 2;
        sy = (img.height - cropSize) / 2;
    }

    ctx.drawImage(
        img,
        sx, sy, cropSize, cropSize,
        150, 200, 500, 500
    );

    ctx.drawImage(template, 0, 0, canvas.width, canvas.height);
};
        img.src = event.target.result;
    };

    reader.readAsDataURL(e.target.files[0]);
};

function download() {
    const link = document.createElement('a');
    link.download = 'diy-photo.png';
    link.href = canvas.toDataURL('image/png');
    link.click();
}
</script>

</body>
</html>
